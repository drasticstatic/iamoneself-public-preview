<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="haloRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="eagleWing" x1="100%" y1="0%" x2="0%" y2="80%">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#d6d3d1"/>
    </linearGradient>
    <linearGradient id="condorWing" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#57534e"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="brownWing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
  </defs>
  <!-- Golden Halo glow — centered -->
  <circle cx="16" cy="16" r="15" fill="url(#halo)"/>
  <!-- Golden Halo ring — centered on bird composition -->
  <circle cx="16" cy="15" r="11.5" fill="none" stroke="url(#haloRing)" stroke-width="0.9" opacity="0.55"/>
  <!-- ── Shifted down 2px from prior version for vertical centering ── -->
  <!-- Upper Eagle wing (left, white) — 3 distinct feather vertex points -->
  <path d="M15,16 Q12,11 10,7 Q9,5 7.5,5 Q8.5,7 7,9 Q5.5,7 4,7.5 Q5.5,8.5 4.5,10.5 Q3,9.5 2,10 Q4,12 6,13.5 L9,15.5 L12,16.5" fill="url(#eagleWing)" opacity="0.85"/>
  <!-- Upper Condor wing (right, dark) — 3 distinct feather vertex points -->
  <path d="M17,16 Q20,11 22,7 Q23,5 24.5,5 Q23.5,7 25,9 Q26.5,7 28,7.5 Q26.5,8.5 27.5,10.5 Q29,9.5 30,10 Q28,12 26,13.5 L23,15.5 L20,16.5" fill="url(#condorWing)" opacity="0.85"/>
  <!-- Lower Brown wings (eagle side) -->
  <path d="M14,19 Q10,20 6,23 Q8,22 10,22 Q9,24 8,26 Q10,24 13,22 L14,20" fill="url(#brownWing)" opacity="0.7"/>
  <!-- Lower Brown wings (condor side) -->
  <path d="M18,19 Q22,20 26,23 Q24,22 22,22 Q23,24 24,26 Q22,24 19,22 L18,20" fill="url(#brownWing)" opacity="0.7"/>
  <!-- Condor head (BEHIND owl — drawn first for z-order) -->
  <ellipse cx="20" cy="11.5" rx="2.2" ry="2.5" fill="#44403c"/>
  <path d="M20,11.5 L21.5,12.3 L20,13" fill="#f59e0b"/>
  <circle cx="20.7" cy="11" r="0.7" fill="#1c1917"/>
  <circle cx="20.9" cy="10.7" r="0.2" fill="#fef3c7"/>
  <!-- Condor neck ruff -->
  <ellipse cx="20" cy="13.5" rx="1.8" ry="1" fill="#57534e" opacity="0.5"/>
  <!-- Eagle head (left side) -->
  <ellipse cx="12" cy="11.5" rx="2.2" ry="2.5" fill="#e7e5e4"/>
  <polygon points="12,11.5 10.5,12.3 12,13" fill="#f59e0b"/>
  <circle cx="11.3" cy="11" r="0.7" fill="#1c1917"/>
  <circle cx="11.1" cy="10.7" r="0.2" fill="#fef3c7"/>
  <!-- Owl face (center — Barn Owl = the two as one) — drawn LAST, in front -->
  <ellipse cx="16" cy="12.5" rx="2.8" ry="3" fill="#a8a29e"/>
  <circle cx="14.5" cy="12" r="1.3" fill="#fbbf24" opacity="0.9"/>
  <circle cx="17.5" cy="12" r="1.3" fill="#fbbf24" opacity="0.9"/>
  <circle cx="14.5" cy="12" r="0.7" fill="#1c1917"/>
  <circle cx="17.5" cy="12" r="0.7" fill="#1c1917"/>
  <circle cx="14.7" cy="11.7" r="0.2" fill="#fef3c7"/>
  <circle cx="17.7" cy="11.7" r="0.2" fill="#fef3c7"/>
  <polygon points="16,13.5 15,14.7 17,14.7" fill="#f59e0b"/>
  <!-- Ear tufts (owl hint) -->
  <polygon points="14,10 13.5,8 15,9.5" fill="#78716c" opacity="0.6"/>
  <polygon points="18,10 18.5,8 17,9.5" fill="#78716c" opacity="0.6"/>
  <!-- Central body -->
  <ellipse cx="16" cy="19" rx="3.5" ry="4" fill="#a8a29e" opacity="0.4"/>
  <!-- Tail — 3 feathers (unified flight) -->
  <path d="M14,22 L13,29 L14.5,27.5 L16,30 L17.5,27.5 L19,29 L18,22" fill="#78350f" opacity="0.6"/>
</svg>
