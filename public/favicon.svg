<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
  </defs>
  <!-- Golden halo background -->
  <circle cx="16" cy="16" r="15" fill="url(#glow)"/>
  <!-- Owl body -->
  <ellipse cx="16" cy="18" rx="10" ry="11" fill="url(#body)" rx="3"/>
  <!-- Ear tufts -->
  <polygon points="8,8 7,2 11,7" fill="#92400e"/>
  <polygon points="24,8 25,2 21,7" fill="#92400e"/>
  <!-- Face disc -->
  <ellipse cx="16" cy="15" rx="8" ry="7" fill="#d97706" opacity="0.2"/>
  <!-- Eyes - Golden rings representing the Spiritual Eye -->
  <circle cx="12" cy="14" r="3" fill="#fbbf24"/>
  <circle cx="20" cy="14" r="3" fill="#fbbf24"/>
  <circle cx="12" cy="14" r="1.8" fill="#1c1917"/>
  <circle cx="20" cy="14" r="1.8" fill="#1c1917"/>
  <!-- Eye highlights -->
  <circle cx="12.8" cy="13.2" r="0.6" fill="#fef3c7"/>
  <circle cx="20.8" cy="13.2" r="0.6" fill="#fef3c7"/>
  <!-- Beak -->
  <polygon points="16,16 14.5,18 17.5,18" fill="#f59e0b"/>
  <!-- Wing outlines -->
  <path d="M6,18 Q4,14 8,10" fill="none" stroke="#78350f" stroke-width="0.8" opacity="0.5"/>
  <path d="M26,18 Q28,14 24,10" fill="none" stroke="#78350f" stroke-width="0.8" opacity="0.5"/>
</svg>
